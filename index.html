<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sugimine Search</title>
<style>

:root{
  --ink:#1d2733;--muted:#657385;--line:#d8dee8;--bg:#f3f6f9;--card:#fff;
  --blue:#315f8f;--green:#0b6b4b;--red:#8b2635;--cream:#f8f4e8;--shadow:0 12px 30px rgba(24,38,56,.08);
}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Yu Gothic UI",Meiryo,sans-serif;line-height:1.75}
a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
.top{height:48px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:5}
.top .brand{font-weight:700;color:#21334a;letter-spacing:.04em}.top .back{font-size:13px;color:#66758a}
.wrap{max-width:920px;margin:28px auto;padding:0 18px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:26px;margin:18px 0}
.kicker{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
h1{font-size:28px;line-height:1.3;margin:0 0 12px} h2{font-size:20px;margin:24px 0 8px}
p{margin:9px 0}.muted{color:var(--muted);font-size:13px}.small{font-size:12px;color:var(--muted)}
.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:2px 10px;font-size:12px;color:#5a6878;background:#fbfcfd;margin:3px}
.keyword{font-weight:700;color:#8a4b00;border-bottom:1px dotted #b88a39}.btn{display:inline-block;background:#24384f;color:#fff;border-radius:10px;padding:10px 15px;margin:6px 6px 0 0}
.btn:hover{text-decoration:none;background:#172739}.danger{color:var(--red);font-weight:700}.notice{background:#fff8dd;border-left:4px solid #d0a52e;padding:12px 14px;border-radius:8px;margin:12px 0}.doc{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;background:#fff;border:1px solid #d7d0bf;padding:22px;border-radius:8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.footer{margin:32px auto 20px;text-align:center;font-size:12px;color:#8995a3}
input,button{font:inherit} .searchline{display:flex;gap:8px;margin:14px 0}.searchline input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}.searchline button{border:0;border-radius:10px;background:#315f8f;color:#fff;padding:10px 16px;cursor:pointer}.result{border-left:3px solid #6d8fb1;padding:10px 0 10px 14px;margin:12px 0;background:#fff}.result .url{font-size:12px;color:#177245}.result a{font-size:17px;font-weight:650}
@media(max-width:650px){.wrap{margin:18px auto}.card{padding:18px}h1{font-size:23px}.searchline{flex-direction:column}.top{padding:0 14px}}

body{background:linear-gradient(180deg,#eef3f7 0,#f8fafc 42%,#f4f6f9 100%)}
.hero{max-width:820px;margin:58px auto 24px;padding:0 18px;text-align:center}
.logo{font-size:38px;font-weight:800;letter-spacing:.02em;color:#26486b}.logo span{color:#6b7f95}
.sub{color:#788697;font-size:13px;margin-top:4px}.bigsearch{display:flex;gap:8px;max-width:680px;margin:24px auto 0;background:#fff;border:1px solid #d9e1ea;border-radius:18px;padding:8px;box-shadow:0 12px 26px rgba(41,68,96,.12)}.bigsearch input{flex:1;border:0;padding:12px 14px;font-size:16px;outline:0}.bigsearch button{border:0;border-radius:12px;background:#2d5b89;color:#fff;padding:0 22px;cursor:pointer}
.panel{max-width:820px;margin:16px auto;padding:0 18px}.section-title{font-size:13px;color:#657385;margin:22px 0 8px;font-weight:700}.local-card{display:block;background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);text-align:left}.local-card:hover{text-decoration:none;background:#fbfdff}.local-card h3{margin:0 0 6px;color:#234b77;font-size:18px}.local-card p{margin:0;color:#5f6f82;font-size:13px}#results{display:none;background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:18px;margin-top:18px;box-shadow:var(--shadow);text-align:left}.result{border-left:3px solid #3c6b97;background:#fbfdff}.history{display:flex;gap:10px;align-items:center;color:#315f8f;font-size:14px}.history:before{content:"🕘"}
</style></head><body>
<div class="hero">
  <div class="logo">Sugimine<span>Search</span></div>
  <div class="sub">地域情報・観光案内・公開アーカイブ検索</div>
  <div class="bigsearch"><input id="q" placeholder="検索ワードを入力..." onkeydown="if(event.key==='Enter')search()"><button onclick="search()">検索</button></div>
  <div id="results"></div>
</div>
<div class="panel" id="homeblocks">
  <div class="section-title">地域の話題</div>
  <a class="local-card" href="forum.html">
    <h3>【画像】この山、全部墓みたいなんだが…</h3>
    <p>京都山中で撮影された白い林について語る匿名掲示板の投稿。ura-navi.example/thread/1049382</p>
  </a>
  <div class="section-title">最近開いたページ</div>
  <a class="local-card history" href="chat.html">杉谷遥とのチャットログ</a>
</div>
<div class="footer">検索結果は完全ではありません</div>
<script>
const data=[
{keys:["杉守村","杉守"], title:"【攻略】小さな観光地・杉守村", desc:"杉守山の麓にある小さな村。近年は杉鳴神社を中心に観光客も増えている。", url:"travel.local/sugimori-village", link:"village.html"},
{keys:["杉鳴神社","杉鳴"], title:"杉鳴神社 公式案内", desc:"杉守山に鎮座する小さな神社。杉鳴大人を祀るとされる。", url:"suginari-shrine.example", link:"shrine.html"},
{keys:["巡山祭"], title:"巡山祭について", desc:"杉守村で毎年行われる祭礼。一般公開されるのは奉納舞と酒造りまで。", url:"suginari-shrine.example/festival", link:"festival.html"},
{keys:["私立北杉高校","北杉高校"], title:"私立北杉高校", desc:"杉守村にある小規模な私立高校。村と密接な関係を持つ。", url:"kitasugi-high.example", link:"school.html"},
{keys:["榊病院"], title:"榊病院 公式サイト", desc:"杉守村周辺の地域医療を担う病院。", url:"sakaki-hospital.example", link:"hospital.html"},
{keys:["榊隆文","榊"], title:"榊隆文 医師紹介", desc:"榊病院の現院長。地域医療支援に尽力している。", url:"sakaki-hospital.example/director", link:"sakaki.html"},
{keys:["榊隆文","榊"], title:"「名門出身の医師、山間地域を支える」", desc:"地域医療に携わる榊隆文医師へのインタビュー記事。", url:"local-interview.example/sakaki", link:"sakaki_interview.html"},
{keys:["杉守村土地購入及び使用記録","土地購入","使用記録"], title:"杉守村土地購入及び使用記録", desc:"過去の土地利用申請と建築記録。", url:"sugimori-village.example/records/land", link:"land.html"}
];
function search(){
 const q=document.getElementById('q').value.trim();
 const box=document.getElementById('results');
 if(!q){box.style.display='none';return}
 let res=data.filter(r=>r.keys.some(k=>q.includes(k)||k.includes(q))).slice(0,3);
 box.style.display='block';
 if(!res.length){box.innerHTML='<p class="muted">該当する検索結果はありません。</p>';return}
 box.innerHTML='<div class="kicker">検索結果</div>'+res.map(r=>`<div class="result"><a href="${r.link}">${r.title}</a><div class="url">${r.url}</div><div class="desc">${r.desc}</div></div>`).join('');
}
</script></body></html>
